<svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf1"/>
      <stop offset="50%" stop-color="#c990ff"/>
      <stop offset="100%" stop-color="#ff6ec7"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"
        fill="url(#logoGrad)" font-family="Inter, sans-serif"
        font-weight="900" font-size="32" letter-spacing="8"
        filter="url(#logoGlow)">
    К
  </text>
  <text x="52" y="55%" dominant-baseline="middle" text-anchor="start"
        fill="rgba(255,255,255,0.4)" font-family="Inter, sans-serif"
        font-weight="300" font-size="16" letter-spacing="4">
    АТАРСИС
  </text>
</svg>
