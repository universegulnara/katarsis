<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Страница не найдена | Катарсис</title>
  <meta name="robots" content="noindex, follow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=AR+One+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'AR One Sans', 'Inter', sans-serif;
      background: #0a0a1a;
      color: #f0eeff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 24px;
    }
    .container { max-width: 480px; }
    h1 {
      font-size: 80px;
      font-weight: 700;
      background: linear-gradient(135deg, #c990ff, #ff6ec7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      opacity: 0.7;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .sub { font-size: 14px; opacity: 0.4; margin-bottom: 40px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border: none;
      border-radius: 16px;
      font-family: 'AR One Sans', 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #c990ff, #536dfe);
      color: #fff;
      text-decoration: none;
      transition: 0.3s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(201, 144, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Такой страницы нет</p>
    <p class="sub">Возможно, она была перемещена или удалена</p>
    <a href="index.html" class="btn"><i class="fas fa-arrow-left"></i> На главную</a>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</body>
</html>
