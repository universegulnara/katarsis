<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обновление сайта — Катарсис</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a1a; color: #fff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: rgba(255,255,255,.05); border-radius: 20px;
      padding: 48px; text-align: center; max-width: 420px;
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(12px);
    }
    h1 { font-size: 24px; margin-bottom: 12px; color: #c990ff; }
    p { font-size: 14px; color: rgba(255,255,255,.6); margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 16px 40px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #c990ff, #536dfe);
      color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,144,255,.4); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
    .status { margin-top: 20px; font-size: 14px; min-height: 24px; }
    .status--ok { color: #4ade80; }
    .status--err { color: #f87171; }
    .status--loading { color: #c990ff; }
    .link-main { color: rgba(255,255,255,.4); text-decoration: none; transition: color .15s; }
    .link-main:hover { color: #c990ff; }
    .btn--outline {
      background: transparent; border: 1px solid rgba(255,255,255,.2);
    }
    .btn--outline:hover { border-color: #c990ff; }
    .footer { margin-top: 24px; font-size: 12px; color: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔄 Обновление сайта</h1>
    <p>Подтянуть свежий конфиг из Google Таблицы и обновить GitHub Pages</p>
    <button class="btn" id="updateBtn">
      <span>⟳</span> Update Site
    </button>
    <div class="status" id="status"></div>
    <div class="footer"><a href="index.html" class="link-main">← На главную</a></div>
  </div>

  <script>
    const URL = 'https://script.google.com/macros/s/AKfycbz6eDDMiDwo7mT1AAPs6SXNaaDkZEGCL55EV4HmczZqMr7sSOKU3w4XYPNn4ooiJcRK/exec';

    document.getElementById('updateBtn').addEventListener('click', async () => {
      const btn = document.getElementById('updateBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.className = 'status status--loading';
      status.textContent = '⏳ Запуск сборки...';

      try {
        const res = await fetch(URL + '?action=build');
        const data = await res.json();
        if (data.status === 'ok') {
          status.className = 'status status--ok';
          status.textContent = '✅ Сборка запущена! Ждите ~1 минуту.';
        } else {
          throw new Error(data.message || data.error || 'Ответ скрипта: ' + JSON.stringify(data).slice(0, 200));
        }
      } catch (err) {
        status.className = 'status status--err';
        status.textContent = '❌ ' + err.message;
      }
      btn.disabled = false;
    });
  </script>
</body>
</html>
