name: Build config from Google Sheet
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      - run: node build.js
        env:
          GAS_URL: ${{ vars.GAS_URL }}
      - run: |
          git config user.name "Config Bot"
          git config user.email "bot@katarsis.local"
          git add index.html 404.html update.html about/index.html cocktail-card/index.html private-events/index.html booking/index.html locations/index.html locations/kazan/index.html franchise/index.html franchise/format/index.html franchise/economics/index.html franchise/support/index.html franchise/steps/index.html franchise/faq/index.html franchise/apply/index.html merch/index.html contacts/index.html consent/index.html privacy/index.html
          git diff --cached --quiet || git commit -m "config update $(date +%Y-%m-%d)"
          git push
